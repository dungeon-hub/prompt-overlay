# Done to increase the memory available to gradle. Building 3 Minecraft versions at once is heavier.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Mod/Fabric properties now live in stonecutter.properties.toml, since they differ per targeted
# Minecraft version. See https://stonecutter.kikugie.dev/wiki/config/properties
